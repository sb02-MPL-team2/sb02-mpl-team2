spring:
  batch:
    job:
      enabled: false
  sql:
    init:
      mode: never

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: false

mpl:
  admin:
    username: test-admin
    password: test-pass

logging:
  level:
    org:
      hibernate:
        SQL: debug
        orm.jdbc.bind: trace
    org.springframework.jdbc.core: DEBUG
    org.springframework.batch: DEBUG
