spring:
  application:
    name: sb02-mpl-team2
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always
  config:
    import: optional:file:.env[.properties]
  cache:
    type: caffeine
    cache-names:
      - users
      - alarms
      - directMessages
      - playlists
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          max-wait: -1ms
  rabbitmq:
    host: localhost
    port: 5672
    username: ${RABBITMQ_USERNAME:myuser}  # docker-compose에서 설정한 사용자 이름
    password: ${RABBITMQ_PASSWORD:mypassword} # docker-compose에서 설정한 비밀번호
    listener.simple:
      retry:
        enabled: true
        initial-interval: 1000ms
        max-attempts: 3
        multiplier: 2
      default-requeue-rejected: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties.mail.smtp:
      auth: true
      starttls:
        enable: true
  security:
    oauth2:
      client:
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - profile
              - email
            redirect-uri: ${GOOGLE_REDIRECT_URI}
          kakao:
            provider: kakao
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            client-name: Kakao
            scope:
              - account_email
              - profile_nickname
              - profile_image
            redirect-uri: ${KAKAO_REDIRECT_URI}
logging:
  level:
    root: INFO
    org.springframework: WARN
    org.hibernate: WARN
    software.amazon.awssdk: DEBUG
    com.codeit.sb02mplteam2: DEBUG

cloud:
  aws:
    region:
      static: ${AWS_S3_REGION:ap-northeast-2}
    credentials:
      instance-profile: false
      access-key: ${AWS_ACCESS_KEY_ID}
      secret-key: ${AWS_SECRET_ACCESS_KEY}
    s3:
      enabled: true
      signer-type: SigV4signer
    stack:
      auto: false

mpl:
  admin:
    username: ${ADMIN_USERNAME:admin}
    email: ${ADMIN_EMAIL:admin@mpl.com}
    password: ${ADMIN_PASSWORD:admin123!}
  reset-password:
    url: ${RESET_PASSWORD_URL}
  storage:
    type: ${STORAGE_TYPE:s3}  # local | s3 (???: local)
    local:
      root-path: ${STORAGE_LOCAL_ROOT_PATH:./storage}
      base-url: /files/
  aws:
    s3:
      bucket: ${AWS_S3_BUCKET:your-bucket-name}
      base-url: ${AWS_S3_BASE_URL:https://your-bucket-name.s3.amazonaws.com}
  notification:
    # 알림 데이터를 DB에 보관할 최대 일수 (이 기간이 지나면 삭제)
    retention-period-in-days: ${RETENTION_PERIOD_IN_DAYS:3}
  sse:
    inactive-timeout-minutes: ${SSE_INACTIVE_TIMEOUT_MINUTES:10}
    default-timeout: ${SSE_DEFAULT_TIMEOUT:30}
    max-connections: ${SSE_MAX_CONNECTIONS:100}
  livewatch:
    redis:
      streams:
        stream-key: ${LIVEWATCH_STREAM_KEY:livewatch:broadcast}
        consumer-id: ${LIVEWATCH_REDIS_STREAMS_CONSUMER_ID:}
  scheduler:
    # 테스트 모드 활성화 플래그 (true로 바꾸면 테스트용 cron이 적용됩니다)
    test-mode: ${SCHEDULER_TEST_MODE:false}
    # 테스트용 cron (매 1분마다 실행)
    # 매 30초마다 실행
    cron-test-playlist: "30 * * * * *"
    # 매 1분마다 실행
    cron-test-recommend: "0 * * * * *"
    # 운영용 cron (기존 스케줄)
    # 00시 01분에 스케쥴링 시작
    cron-prod-recommend: "0 1 0 * * *"
    # 06시 00분에 스케쥴링 시작
    cron-prod-playlist: "0 0 6 * * *"
  oauth:
    common-logout-redirect-uri: ${COMMON_LOGOUT_REDIRECT_URI}
    # 프론트엔드 기본 URL (환경별로 다름)
    frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:8080}
    # OAuth2 콜백 성공 페이지 경로
    callback-success-path: ${OAUTH_CALLBACK_SUCCESS_PATH:/oauth2/callback/success}
    # 쿠키 도메인 설정 (Docker 환경 대응)
    cookie-domain: ${COOKIE_DOMAIN:localhost}


jwt:
  secret: ${JWT_SECRET_KEY:this-is-a-default-secret-key-for-local-dev-only-and-is-not-secure}
  access-token-expiration: 600 # 10 분
  refresh-token-expiration: 604800 # 7일

external-api:
  tmdb:
    api-key: ${TMDB_API_KEY:test_key}
    base-url: ${TMDB_BASE_URL:test_url}
  sportsdb:
    api-key: ${SPORTSDB_API_KEY:test_sportdb_key}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    mail:
      enabled: false

server:
  forward-headers-strategy: NATIVE