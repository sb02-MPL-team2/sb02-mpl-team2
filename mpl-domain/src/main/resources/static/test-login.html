<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>OAuth2 로그인 테스트</title>
</head>
<body>
<h1>로그인 테스트 페이지</h1>
<p>아래 링크를 클릭하여 Google 로그인을 시작하세요.</p>
<a href="http://localhost:8080/oauth2/authorization/google">
  <h2>Google로 로그인하기</h2>
</a>
<p>아래 링크를 클릭하여 Kakao 로그인을 시작하세요.</p>
<a href="http://localhost:8080/oauth2/authorization/kakao">
  <h2>Kakao로 로그인하기</h2>
</a>
</body>
</html>
