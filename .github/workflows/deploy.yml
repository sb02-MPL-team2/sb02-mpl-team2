name: Deploy to ECS

on:
  push:
    branches:
      - deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew build -x test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set environment variables
        run: |
          echo "ECR_REGISTRY=${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com" >> $GITHUB_ENV
          echo "IMAGE_TAG=$(date +'%Y%m%d%H%M%S')-${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_DEPLOY_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_DEPLOY_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Spring Boot app image
        run: |
          docker buildx build --platform linux/amd64 \
            -t ${{ env.ECR_REGISTRY }}/mpl-app:${{ env.IMAGE_TAG }} \
            -t ${{ env.ECR_REGISTRY }}/mpl-app:latest \
            -f mpl-domain/Dockerfile \
            --push .

      - name: Build and push Nginx proxy image
        run: |
          docker buildx build --platform linux/amd64 \
            -t ${{ env.ECR_REGISTRY }}/mpl-nginx:${{ env.IMAGE_TAG }} \
            -t ${{ env.ECR_REGISTRY }}/mpl-nginx:latest \
            -f nginx/Dockerfile \
            --push nginx/

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ vars.ECS_TASK_DEFINITION }} \
            --query taskDefinition > task-definition.json

      - name: Update Spring Boot container in task definition
        id: render-spring-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: mpl-app
          image: ${{ env.ECR_REGISTRY }}/mpl-app:${{ env.IMAGE_TAG }}

      - name: Update Nginx container in task definition
        id: render-nginx-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.render-spring-task-def.outputs.task-definition }}
          container-name: nginx-proxy
          image: ${{ env.ECR_REGISTRY }}/mpl-nginx:${{ env.IMAGE_TAG }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-nginx-task-def.outputs.task-definition }}
          cluster: ${{ vars.ECS_CLUSTER }}
          service: ${{ vars.ECS_SERVICE }}
          force-new-deployment: true
          wait-for-service-stability: true
          desired-count: 1

      - name: Verify deployment
        run: |
          echo "Verifying deployment..."
          sleep 30
          
          # Check service status
          SERVICE_STATUS=$(aws ecs describe-services \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --services ${{ vars.ECS_SERVICE }} \
            --query 'services[0].status' \
            --output text)
          
          echo "Service status: $SERVICE_STATUS"
          
          # Check running tasks
          RUNNING_TASKS=$(aws ecs describe-services \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --services ${{ vars.ECS_SERVICE }} \
            --query 'services[0].runningCount' \
            --output text)
          
          echo "Running tasks: $RUNNING_TASKS"
          
          if [ "$SERVICE_STATUS" = "ACTIVE" ] && [ "$RUNNING_TASKS" = "1" ]; then
            echo "✅ Deployment successful! Service is active with 1 running task."
            
            # Test health endpoint
            echo "Testing health endpoint..."
            sleep 60  # Wait for containers to be fully ready
            
            HEALTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://${{ vars.ALB_DNS }}/health || echo "000")
            
            if [ "$HEALTH_STATUS" = "200" ]; then
              echo "✅ Health check passed!"
            else
              echo "⚠️ Health check returned status: $HEALTH_STATUS"
            fi
          else
            echo "❌ Deployment failed. Service status: $SERVICE_STATUS, Running tasks: $RUNNING_TASKS"
            exit 1
          fi