user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # 로그 포맷 설정
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" "$http_x_forwarded_for" '
                   'rt=$request_time uct="$upstream_connect_time" '
                   'uht="$upstream_header_time" urt="$upstream_response_time"';
    
    access_log /var/log/nginx/access.log main;
    
    # 기본 성능 설정
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;
    
    # Gzip 압축 설정
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml;
    
    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # 서버 정보 숨기기
    server_tokens off;
    
    # 업스트림 설정 (Spring Boot 컨테이너)
    upstream spring-backend {
        server localhost:8080 max_fails=3 fail_timeout=30s backup;
        server 127.0.0.1:8080 weight=3 max_fails=5 fail_timeout=10s;
        keepalive 32;
        keepalive_requests 100;
        keepalive_timeout 60s;
    }

    server {
        listen 80;
        server_name _;
        
        # 루트 디렉토리 설정 (공유 볼륨)
        root /var/www/html;
        index index.html;

        location / {
            try_files $uri $uri/ @fallback;
            
            # 정적 파일 캐싱 (JS, CSS, 이미지 등)
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, no-transform, immutable";
                add_header Vary "Accept-Encoding";
                access_log off;
            }
            
            # HTML 파일은 캐싱하지 않음
            location ~* \.html$ {
                expires -1;
                add_header Cache-Control "no-cache, no-store, must-revalidate";
                add_header Pragma "no-cache";
            }
        }
        
        # SPA 폴백 (클라이언트 라우팅 지원) - 임시로 Spring Boot로 폴백
        location @fallback {
            try_files /index.html @spring_fallback;
        }
        
        # Spring Boot로 폴백 (정적 파일이 없을 때)
        location @spring_fallback {
            proxy_pass http://spring-backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            proxy_pass http://spring-backend;
            
            # 프록시 헤더 설정
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Prefix /api;
            
            # 타임아웃 설정 (Spring Boot 시작 시간 고려)
            proxy_connect_timeout 15s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;
            
            # 업스트림 서버 실패 시 재시도
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 30s;
            
            # 버퍼링 설정
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        location /ws/ {
            proxy_pass http://spring-backend;
            
            # WebSocket 업그레이드 헤더
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # 기본 프록시 헤더
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket 전용 설정
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            
            # WebSocket 연결 유지
            proxy_set_header X-Forwarded-Host $server_name;
        }

        location /sse {
            proxy_pass http://spring-backend;
            
            # SSE 헤더 설정
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Cache-Control "no-cache";
            proxy_set_header Connection "keep-alive";
            
            # SSE 스트리밍 최적화
            proxy_http_version 1.1;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h;
            proxy_send_timeout 24h;
            
            # 청크 전송 인코딩 활성화
            chunked_transfer_encoding on;
        }

        location /oauth2/ {
            proxy_pass http://spring-backend;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            
            # OAuth2 리다이렉트 처리
            proxy_redirect off;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }
        
        location /login/oauth2/ {
            proxy_pass http://spring-backend;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port $server_port;
            
            proxy_redirect off;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        location /actuator/health {
            proxy_pass http://spring-backend;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # 헬스체크는 빠른 응답 필요하지만 Spring Boot 시작 시간 고려
            proxy_connect_timeout 10s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
            
            # 업스트림 서버 실패 시 재시도
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 20s;
            
            access_log off;
        }
        
        # 일반 Actuator 엔드포인트
        location /actuator/ {
            proxy_pass http://spring-backend;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # =================================================================
        # 보안 및 접근 제한
        # =================================================================
        
        # 숨겨진 파일 접근 차단
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
        
        # 민감한 파일 확장자 차단
        location ~* \.(env|config|log|sql|bak|backup)$ {
            deny all;
            access_log off;
            log_not_found off;
        }
        
        # 시스템 파일 접근 차단
        location ~* /(\.git|\.svn|\.hg|CVS|\.DS_Store|Thumbs\.db) {
            deny all;
            access_log off;
            log_not_found off;
        }
        
        # =================================================================
        # 에러 페이지 처리
        # =================================================================
        
        # SPA 라우팅을 위한 404 처리
        error_page 404 /index.html;
        
        # 서버 에러 페이지
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /var/www/html;
            internal;
        }
        
        # =================================================================
        # 모니터링 및 상태 페이지 (내부용)
        # =================================================================
        
        # Nginx 상태 페이지 (로컬에서만 접근 가능)
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            deny all;
        }
        
        # 간단한 헬스체크 (ALB 백엔드용)
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}