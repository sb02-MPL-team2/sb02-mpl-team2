server {
  listen 8080;
  server_name localhost;

#   access_log /var/log/nginx/mpl-domain/access.log;
#   error_log /var/log/nginx/mpl-domain/error.log;

  # API
  location /api/{
    proxy_pass http://host.docker.internal:7071;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Spring Boot에게 "너에게 가는 모든 요청은 원래 /api라는 경로로 시작했어"라고 명확하게 알려주는 역할
    proxy_set_header X-Forwarded-Prefix /api;

    # Nginx가 백엔드 서버의 응답을 기다리는 최대 시간 (기본값 60초)
    proxy_read_timeout 180s;

    # Nginx가 백엔드 서버와 연결을 맺는 데 기다리는 최대 시간 (기본값 60초)
    proxy_connect_timeout 180s;

    # Nginx가 백엔드 서버로 요청을 보내는 데 걸리는 최대 시간
    proxy_send_timeout 180s;
  }
  # WS
  location ^~ /ws/{
    proxy_pass http://host.docker.internal:7071/ws/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header X-Upstream-Server $upstream_addr;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_http_version 1.1;
  }
  # SSE
  location /sse{
    proxy_pass http://host.docker.internal:7071/sse;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header X-Upstream-Server $upstream_addr;

    proxy_set_header Content-Type text/event-stream;
    proxy_set_header X-Accel-Buffering 'no';
    proxy_buffering off;

    proxy_http_version 1.1;
  }
  # OAuth2 로그인 시작 요청을 백엔드로 전달
  location /oauth2/ {
    proxy_pass http://host.docker.internal:7071; # 실제 백엔드 컨테이너 주소

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Port $server_port;
  }

  # OAuth2 로그인 콜백 요청을 백엔드로 전달
  location /login/oauth2/ {
    proxy_pass http://host.docker.internal:7071; # 실제 백엔드 컨테이너 주소

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Port $server_port;
  }

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
    index index.html;
  }
}